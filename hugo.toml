# 站点基础设置
baseURL = 'https://biaozyx.pages.dev/'
languageCode = 'zh-CN'
title = "Zivon Xue's Campsite"
theme = 'PaperMod'

# 添加作者信息
[author]
  name = "Zivon Xue"

# 菜单设置
[[menu.main]]
  identifier = "posts"
  name = "文章"
  url = "/posts/"
  weight = 10

[[menu.main]]
  identifier = "tags"
  name = "标签"
  url = "/tags/"
  weight = 20

[[menu.main]]
  identifier = "about"
  name = "关于"
  url = "/about/"
  weight = 30

# 个性化参数
[params]
  # 站点描述
  description = "一个喜欢 Alpine Linux 和 KISS 哲学的系统探索者"
  # 关键词
  keywords = ["Linux", "Alpine", "KISS", "系统", "技术"]
  # 默认主题（暗色/亮色）
  defaultTheme = "auto"
  # 显示阅读时间
  ShowReadingTime = true
  # 显示分享按钮
  ShowShareButtons = true
  # 显示目录
  ShowToc = true
  # 显示文章分类
  ShowPostNavLinks = true
